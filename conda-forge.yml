bot:
  abi_migration_branches:
  - '3.9'
  - '3.10'
  - '3.11'
  - '3.12'
  - '3.13'
build_platform:
  linux_ppc64le: linux_64
  win_arm64: win_64
conda_build:
  pkg_format: '2'
conda_forge_output_validation: true
github:
  branch_name: main
  tooling_branch_name: main
provider:
  linux_aarch64: default
  osx_arm64: default
test: native_and_emulated
workflow_settings:
  store_build_artifacts:
    - value: true
